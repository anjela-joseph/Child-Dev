<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in</title>
  <style>
    :root { --bg:#f4f7fb; --card:#fff; --ink:#172033; --muted:#6b7280; --accent:#5b7cff; --border:#e7ebf2; }
    body { font-family: Inter, Arial, sans-serif; margin:0; background:linear-gradient(135deg,#eef3ff,#f8fbff); color:var(--ink); }
    .shell { min-height:100vh; display:grid; place-items:center; padding:24px; }
    .card { width:min(420px,100%); background:var(--card); border:1px solid var(--border); border-radius:20px; padding:24px; box-shadow:0 16px 40px rgba(15,23,42,.08); }
    input { width:100%; box-sizing:border-box; padding:12px 14px; border:1px solid var(--border); border-radius:12px; margin-top:8px; margin-bottom:12px; }
    button { width:100%; border:0; background:var(--accent); color:white; padding:12px 14px; border-radius:12px; cursor:pointer; font-weight:700; }
    .muted { color:var(--muted); font-size:13px; }
    .error { color:#c23b3b; margin-top:8px; font-size:13px; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <h2 style="margin:0 0 8px 0;">Welcome back</h2>
      <p class="muted">Sign in to access your child development dashboard.</p>
      <form id="loginForm">
        <label>Email</label>
        <input id="email" type="email" value="parent@example.com" required />
        <label>Password</label>
        <input id="password" type="password" value="securepass123" required />
        <button type="submit">Sign in</button>
      </form>
      <div id="message" class="error"></div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const message = document.getElementById('message');
      message.textContent = '';
      const res = await fetch('/api/token/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.access) {
        localStorage.setItem('childdev_token', data.access);
        window.location.href = '/';
      } else {
        message.textContent = 'Sign in failed. Please check your credentials.';
      }
    });
  </script>
</body>
</html>
